<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Voice - 가이드 (송출용)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
    
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 2.5rem 2rem;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      color: #d1d5db;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      color: #fff;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #4facfe;
      background: rgba(255, 255, 255, 0.15);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    button {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
      padding: 15px 24px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
    }

    button.stop {
      background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
      box-shadow: 0 4px 15px rgba(255, 8, 68, 0.3);
    }

    button.stop:hover {
      box-shadow: 0 6px 20px rgba(255, 8, 68, 0.4);
    }

    .status {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #mic-status {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: inline-block;
      transition: all 0.1s;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="glass-card">
    <h1>🎙️ 가이드 마이크</h1>
    <p>투어 그룹과 공유할 방 번호(PIN)를 입력하고 방송을 시작하세요.</p>
    
    <input type="text" id="room-id" placeholder="예: 1234" value="1234">
    <input type="password" id="guide-password" placeholder="가이드 전용 비밀번호 입력">
    <button id="btn-start">방송 시작</button>
    <button id="btn-stop" class="stop" style="display: none;">방송 종료</button>

    <div class="status">
      <span id="mic-status"></span>
      <span id="status-text">대기 중...</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
